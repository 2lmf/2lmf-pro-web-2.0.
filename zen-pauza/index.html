<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Pauza | Fokus & Mir</title>
    <meta name="description" content="Tvoj digitalni prostor za fokus, disanje i zdrave navike. Besplatno i offline.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="icon" href="icon-512.png">
</head>

<body>
    <div class="app-container">
        <!-- Background elements for depth -->
        <div class="glow-orb" id="orb-1"></div>
        <div class="glow-orb" id="orb-2"></div>

        <!-- Main Dashboard View (HabitNow Style) -->
        <main id="main-view">
            <div id="view-today" class="view active">
                <header class="app-header">
                    <h1>Danas</h1>
                    <div class="header-icons">
                        <i class="fas fa-search"></i>
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </header>
                <div id="today-list" class="habit-list-container">
                    <!-- Today's habits list will be rendered here -->
                </div>
            </div>

            <div id="view-habits" class="view">
                <header class="app-header">
                    <h1>Navike</h1>
                    <i class="fas fa-search"></i>
                </header>
                <div id="all-habits-list" class="habit-list-container">
                    <!-- Full habits list with 7-day view here -->
                </div>
            </div>

            <div id="view-explore" class="view">
                <header class="app-header">
                    <h1>Relaksacija</h1>
                </header>
                <div class="dashboard">
                    <div class="card breathe-card" onclick="showModule('breathe')">
                        <div class="card-icon"><i class="fas fa-lungs"></i></div>
                        <h3>Dah</h3>
                        <p>Box & Relax</p>
                    </div>
                    <div class="card sounds-card" onclick="showModule('sounds')">
                        <div class="card-icon"><i class="fas fa-volume-up"></i></div>
                        <h3>Zvuk</h3>
                        <p>Sound Oasis</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" id="nav-today" onclick="app.switchView('today')">
                <i class="fas fa-calendar-day"></i>
                <span>Danas</span>
            </button>
            <button class="nav-btn" id="nav-habits" onclick="app.switchView('habits')">
                <i class="fas fa-award"></i>
                <span>Navike</span>
            </button>
            <button class="nav-btn" id="nav-explore" onclick="app.switchView('explore')">
                <i class="fas fa-volume-up"></i>
                <span>Mir</span>
            </button>
        </nav>
    </div>

    <!-- MODULE OVERLAYS -->
    <div id="overlay-container" class="overlay-container">
        <button class="back-btn" onclick="hideModule()">← Povratak</button>
        <div id="module-content" class="module-content">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- Habit Detail Modal (HabitNow Style) -->
    <div id="habit-modal" class="modal">
        <div class="modal-content full-screen">
            <header class="modal-header">
                <button class="close-modal" onclick="app.closeHabitModal()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h2 id="modal-habit-name">Naziv Navike</h2>
                <i class="fas fa-edit"></i>
            </header>
            <div id="modal-habit-content">
                <!-- Detail calendar and stats will be here -->
            </div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="firebase-core.js?v=14"></script>
    <script src="app.js?v=20"></script>
</body>

</html>
