<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Pauza | Fokus & Mir</title>
    <meta name="description" content="Tvoj digitalni prostor za fokus, disanje i zdrave navike. Besplatno i offline.">
    <link rel="stylesheet" href="style.css?v=50">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="icon" href="icon-512.png">
</head>

<body>
    <div class="app-container">
        <!-- Background elements for depth -->
        <div class="glow-orb" id="orb-1"></div>
        <div class="glow-orb" id="orb-2"></div>

        <!-- Main Dashboard View (HabitNow Style) -->
        <main id="main-view">
            <div id="view-today" class="view active">
                <header class="app-header">
                    <h1>Danas</h1>
                    <div class="header-icons">
                        <div class="cloud-sync-pill" id="cloud-status" onclick="app.showLoginOverlay()">
                            <i class="fas fa-cloud"></i>
                            <span>SINKRONIZACIJA</span>
                        </div>
                    </div>
                </header>
                <div id="today-list" class="habit-list-container">
                    <!-- Today's habits list will be rendered here -->
                </div>
            </div>

            <div id="view-habits" class="view">
                <header class="app-header">
                    <h1>Navike</h1>
                </header>
                <div id="all-habits-list" class="habit-list-container">
                    <!-- Full habits list with 7-day view here -->
                </div>
            </div>

            <div id="view-explore" class="view">
                <header class="app-header">
                    <h1>Svijet mira</h1>
                </header>
                <div id="mir-content" class="mir-container">
                    <!-- Integrated Sounds & Breathing will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" id="nav-today" onclick="app.switchView('today')">
                <i class="fas fa-calendar-day"></i>
                <span>Danas</span>
            </button>
            <button class="nav-btn" id="nav-habits" onclick="app.switchView('habits')">
                <i class="fas fa-award"></i>
                <span>Navike</span>
            </button>
            <button class="nav-btn" id="nav-explore" onclick="app.switchView('explore')">
                <i class="fas fa-volume-up"></i>
                <span>Mir</span>
            </button>
        </nav>

        <!-- Floating Action Button -->
        <button class="fab-btn" onclick="app.addCustomHabit()">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- MODULE OVERLAYS -->
    <div id="overlay-container" class="overlay-container">
        <button class="back-btn" onclick="hideModule()">← Povratak</button>
        <div id="module-content" class="module-content">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- Habit Detail Modal (HabitNow v22) -->
    <div id="habit-modal" class="modal">
        <div class="modal-content full-screen">
            <header class="modal-header">
                <button class="close-modal" onclick="app.closeHabitModal()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 id="modal-habit-name">Naziv Navike</h2>
                <div class="header-right">
                    <i class="fas fa-share-nodes"></i>
                </div>
            </header>

            <nav class="modal-tabs">
                <button class="tab-btn active" onclick="app.switchModalTab('calendar')">Kalendar</button>
                <button class="tab-btn" onclick="app.switchModalTab('stats')">Statistika</button>
                <button class="tab-btn" onclick="app.switchModalTab('edit')">Uredi</button>
            </nav>

            <div id="modal-habit-content">
                <!-- Tab contents injected here -->
            </div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registriran:', reg.scope))
                    .catch(err => console.log('SW greška:', err));
            });
        }
    </script>
    <script type="module" src="firebase-core.js?v=51"></script>
    <script src="app.js?v=51"></script>
</body>

</html>
