    /* LAYOUT */

    .product-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; padding: 40px 0 60px; }
    @media(max-width: 768px) { .product-wrap { grid-template-columns: 1fr; gap: 28px; padding: 24px 0 40px; } }

    /* GALLERY */
    .gallery { display: flex; flex-direction: column; gap: 12px; }
    .gallery-main { position: relative; aspect-ratio: 1; background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }

    .gallery-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
    .g-thumb { width: 64px; height: 64px; border-radius: 10px; border: 2px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color .2s; background: var(--surface); flex-shrink: 0; }
    .g-thumb:hover, .g-thumb.active { border-color: var(--accent-orange); }
    .g-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }

    .p-brand { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-orange); margin-bottom: 8px; }

    .badge-gray { background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted); }

    .section-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-cyan); margin-bottom: 20px; }

    .specs-table td:last-child { color: var(--text); font-weight: 600; }

const fmt = n => new Intl.NumberFormat('hr-HR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);

function absImg(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  return BASE_URL + '/' + path;
}

function getUses(p, detail) {
  if (detail.uses) return detail.uses;
  if (detail.expansion) return [
    ['fa-link', `Kompatibilno s modelom navedenim u specifikacijama`],
    ['fa-battery-full', `Dodaje kapacitet sustavu`],
    ['fa-plug', 'Spaja se bez gašenja postaje (hot-swap)'],
  ];
  if (detail.solar) return [
    ['fa-sun', 'Puni bateriju bez strujnog priključka'],
    ['fa-bolt', 'Kompatibilno s XT60 i Anderson konektorima'],
    ['fa-suitcase-rolling', 'Foldable — stane u ruksak'],
  ];
  const wh = p.wh;
  if (!wh) return [];
  const uses = [
    ['fa-snowflake', `Hladnjak — ~${Math.round(wh*0.82/60)} h rada`],
    ['fa-laptop',    `Laptop — ~${Math.floor(wh*0.85/45)} punjenja`],
    ['fa-mobile-screen', `Mobitel — ~${Math.floor(wh*0.85/15)} punjenja`],
    ['fa-lightbulb', `LED rasvjeta — ~${Math.round(wh*0.85/20)} h`],
  ];
  if (wh >= 200) uses.push(['fa-mug-hot', `Espresso aparat — ~${Math.floor(wh*0.85/50)} šalica`]);
  if (wh >= 500) uses.push(['fa-tv', `TV / Monitor — ~${Math.round(wh*0.85/80)} h`]);
  if (wh >= 1000) uses.push(['fa-fan', `Ventilator — ~${Math.round(wh*0.85/25)} h`]);
  return uses;
}

function getCategoryName(type) {
  const map = { battery:'Prijenosne elektrane', expansion:'Expansion baterije', solar:'Solarni paneli', bundle:'Paketi', tent:'Krovni šatori', camper:'Camper oprema' };
  return map[type] || 'Oprema';
}

function renderProduct(p, detail, livePrice) {
  const imgs = detail.imgs || [p.img];
  const price = livePrice !== undefined ? livePrice : null;
  const isBundle = p.type === 'bundle';
  const uses = getUses(p, detail);
  const badges = [];
  if (p.wh > 0) badges.push(`<span class="badge badge-cyan"><i class="fas fa-bolt"></i> ${p.wh} Wh</span>`);
  if (detail.bundle) badges.push(`<span class="badge badge-orange"><i class="fas fa-gift"></i> Paket</span>`);
  if (p.featured) badges.push(`<span class="badge badge-gray"><i class="fas fa-star"></i> Popular</span>`);

  const thumbsHtml = imgs.length > 1
    ? imgs.map((src, i) => `<div class="g-thumb ${i===0?'active':''}" onclick="switchImg(this,'${absImg(src)}')" data-src="${absImg(src)}"><img src="${absImg(src)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`).join('')
    : '';

  const priceHtml = price !== null
    ? `<div class="p-price">${fmt(price)} <small>€ / ${isBundle?'paket':'kom'}</small></div><div class="p-price-note">Cijena uključuje PDV · Dostava besplatna</div>`
    : `<div class="p-price" style="font-size:20px;color:var(--muted);">Na upit</div><div class="p-price-note">Kontaktirajte nas za aktualnu cijenu</div>`;

  const specsHtml = detail.specs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const usesHtml = uses.map(([icon, txt]) => `<div class="use-card"><div class="use-icon"><i class="fas ${icon}"></i></div><div class="use-text">${txt}</div></div>`).join('');

  document.getElementById('product-root').innerHTML = `
    <div class="product-wrap">
      <div class="gallery">
        <div class="gallery-main">
          <img id="main-img" src="${absImg(imgs[0])}" alt="${p.name}" onerror="this.style.display='none'">
        </div>
        ${thumbsHtml ? `<div class="gallery-thumbs">${thumbsHtml}</div>` : ''}
      </div>
      <div class="p-info">
        <div class="p-brand">${p.brand} &nbsp;·&nbsp; SKU: ${p.sku}</div>
        <h1 class="p-name">${p.name}</h1>
        <div class="p-sub">${p.sub}</div>
        ${badges.length ? `<div class="p-badges">${badges.join('')}</div>` : ''}
        <div class="p-price-wrap">${priceHtml}</div>
        <div class="cta-wrap">
          <button class="btn-primary" onclick="openInquiry('${p.sku}','${p.name.replace(/'/g,"\\'")}')">
            <i class="fas fa-paper-plane"></i> ZATRAŽI PONUDU
          </button>
          <a href="kalkulator.html" class="btn-secondary">
            <i class="fas fa-calculator"></i> Vidi u kalkulatoru
          </a>
        </div>
        <div class="warranty-line"><i class="fas fa-shield-halved"></i> Jamstvo: 2 godine</div>
      </div>
    </div>

    <section class="block">
      <div class="section-title">Tehničke specifikacije</div>
      <table class="specs-table"><tbody>${specsHtml}</tbody></table>
    </section>

    ${uses.length ? `<section class="block">
      <div class="section-title">Što možete napajati</div>
      <div class="uses-grid">${usesHtml}</div>
    </section>` : ''}
  `;

  // Update meta
  const desc = `${p.name} — ${p.sub}. Prijenosna solarna elektrana, LiFePO₄ baterija. 2LMF PRO Zagreb.`;
  document.getElementById('page-title').textContent = `${p.name} — 2LMF PRO`;
  document.getElementById('page-desc').content = desc;
  document.getElementById('og-title').content = p.name;
  document.getElementById('og-desc').content = desc;
  document.getElementById('og-image').content = absImg(imgs[0]);
  document.getElementById('page-canonical').href = `${BASE_URL}/proizvod.html?sku=${p.sku}`;
  document.getElementById('bread-name').textContent = p.name;

  // Schema.org Product
  const schema = { "@context":"https://schema.org","@type":"Product","name":p.name,"description":desc,"sku":p.sku,"brand":{"@type":"Brand","name":p.brand},"image":absImg(imgs[0]),"url":`${BASE_URL}/proizvod.html?sku=${p.sku}`,"offers":{"@type":"Offer","priceCurrency":"EUR","price":price||0,"availability":price?"https://schema.org/InStock":"https://schema.org/PreOrder","seller":{"@type":"Organization","name":"2LMF PRO"},"warranty":{"@type":"WarrantyPromise","durationOfWarranty":{"@type":"QuantitativeValue","value":2,"unitCode":"ANN"}}}};
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(schema);
  document.head.appendChild(s);
}

function switchImg(thumb, src) {
  document.getElementById('main-img').src = src;
  document.querySelectorAll('.g-thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

let currentSku = '';
function openInquiry(sku, name) {
  currentSku = sku;
  document.getElementById('modal-product-name').textContent = name;
  document.getElementById('inq-status').textContent = '';
  document.getElementById('inquiryModal').classList.add('open');
}
function closeInquiry() {
  document.getElementById('inquiryModal').classList.remove('open');
}
document.getElementById('inquiryModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeInquiry(); });

async function submitInquiry() {
  const name  = document.getElementById('inq-name').value.trim();
  const email = document.getElementById('inq-email').value.trim();
  const phone = document.getElementById('inq-phone').value.trim();
  const note  = document.getElementById('inq-note').value.trim();
  const st    = document.getElementById('inq-status');
  if (!email) { st.textContent = 'Unesite email adresu.'; return; }
  st.textContent = 'Šaljem...';
  const p = ENERGY_PRODUCTS.find(x => x.sku === currentSku);
  const params = new URLSearchParams({
    email, name, phone,
    _subject: `Upit [ENERGY] SKU:${currentSku}`,
    items_json: JSON.stringify([{ sku: currentSku, name: p?.name||currentSku, qty:1, unit:'kom', price:0 }]),
    source: 'ProizvodPage',
    color: note || `Upit za: ${p?.name||currentSku}`
  });
  try {
    await fetch(`${GAS_URL}?${params.toString()}`, { method:'GET', mode:'no-cors' });
    st.textContent = '✓ Upit poslan! Javit ćemo se u roku 24h.';
    setTimeout(closeInquiry, 2800);
  } catch(e) {
    st.textContent = 'Greška pri slanju. Kontaktirajte info@2lmf-pro.hr';
  }
}

// Init
async function init() {
  const sku = new URLSearchParams(location.search).get('sku');
  const p = ENERGY_PRODUCTS.find(x => x.sku === sku);
  const detail = ENERGY_DETAIL[sku];

  if (!p || !detail) {
    document.getElementById('product-root').innerHTML = `
      <div class="not-found">
        <h2>Proizvod nije pronađen</h2>
        <p>SKU "${sku || '?'}" ne postoji u katalogu.</p>
        <a href="kalkulator.html" class="btn-primary" style="display:inline-flex;gap:10px;">
          <i class="fas fa-arrow-left"></i> Natrag na katalog
        </a>
      </div>`;
    return;
  }

  renderProduct(p, detail, undefined);

  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    const prices = data.prices || data;
    if (prices[sku] !== undefined) renderProduct(p, detail, prices[sku]);
  } catch(e) {}
}

init();
</script>
</body>
</html>
